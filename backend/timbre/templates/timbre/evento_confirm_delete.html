<!DOCTYPE html>
<html>
<head>
    <title>Eliminar Evento</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; text-align: center; }
        button { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px; }
        .cancel { background: #95a5a6; text-decoration: none; padding: 10px 20px; border-radius: 4px; color: white; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>¿Eliminar "{{ evento.nombre }}"?</h2>
        <p>Esta acción es irreversible.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Sí, eliminar</button>
            <a href="{% url 'timbre:eventos' %}" class="cancel">Cancelar</a>
        </form>
    </div>
</body>
</html>
