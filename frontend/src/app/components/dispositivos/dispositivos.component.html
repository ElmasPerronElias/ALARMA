<div class="crud-container">
  <div class="crud-header">
    <h1>📟 Dispositivos</h1>
    <button class="btn-primary" (click)="abrirModal()">+ Nuevo Dispositivo</button>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="🔍 Buscar por nombre, código o sede..." [(ngModel)]="searchTerm">
  </div>

  <div *ngIf="isLoading" class="loading">Cargando...</div>

  <div *ngIf="!isLoading" class="crud-table">
    <table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Código</th><th>Tipo</th><th>Sede</th><th>IP</th><th>Estado</th><th>Acciones</th></thead>
      <tbody>
        <tr *ngFor="let item of dispositivosFiltrados">
          <td>{{ item.id }}</td>
          <td><strong>{{ item.nombre }}</strong></td>
          <td><code>{{ item.codigo_dispositivo }}</code></td>
          <td><span class="badge-tipo">{{ item.tipo }}</span></td>
          <td>{{ item.sede_nombre || '-' }}</td>
          <td>{{ item.ip_address || '-' }}</td>
          <td><span class="badge" [class.active]="item.activo">{{ item.activo ? 'Activo' : 'Inactivo' }}</span></td>
          <td class="actions">
            <button class="btn-edit" (click)="abrirModal(true, item)">✏️</button>
            <button class="btn-delete" (click)="eliminar(item.id!)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal" [class.show]="showModal">
    <div class="modal-content">
      <h3>{{ editando ? 'Editar' : 'Nuevo' }} Dispositivo</h3>
      <select [(ngModel)]="formData.sede" class="form-input">
        <option [value]="0">Seleccione sede</option>
        <option *ngFor="let s of sedes" [value]="s.id">{{ s.nombre }}</option>
      </select>
      <input [(ngModel)]="formData.nombre" placeholder="Nombre del dispositivo *" class="form-input">
      <input [(ngModel)]="formData.codigo_dispositivo" placeholder="Código único *" class="form-input">
      <select [(ngModel)]="formData.tipo" class="form-input">
        <option *ngFor="let t of tipos" [value]="t">{{ t }}</option>
      </select>
      <input [(ngModel)]="formData.ip_address" placeholder="Dirección IP" class="form-input">
      <label class="checkbox-label"><input type="checkbox" [(ngModel)]="formData.activo"> Activo</label>
      <div class="modal-buttons">
        <button class="btn-primary" (click)="guardar()">Guardar</button>
        <button class="btn-secondary" (click)="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>
</div>
