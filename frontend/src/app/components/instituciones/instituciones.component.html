<div class="crud-container">
  <div class="crud-header">
    <h1>🏛️ Instituciones</h1>
    <button class="btn-primary" (click)="abrirModal()">+ Nueva Institución</button>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="🔍 Buscar por nombre o RUC..." [(ngModel)]="searchTerm">
  </div>

  <div *ngIf="isLoading" class="loading">Cargando...</div>

  <div *ngIf="!isLoading" class="crud-table">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Nombre</th><th>RUC</th><th>Teléfono</th><th>Email</th><th>Estado</th><th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of institucionesFiltradas">
          <td>{{ item.id }}</td>
          <td><strong>{{ item.nombre }}</strong></td>
          <td>{{ item.ruc || '-' }}</td>
          <td>{{ item.telefono || '-' }}</td>
          <td>{{ item.email || '-' }}</td>
          <td><span class="badge" [class.active]="item.activo">{{ item.activo ? 'Activo' : 'Inactivo' }}</span></td>
          <td class="actions">
            <button class="btn-edit" (click)="abrirModal(true, item)">✏️</button>
            <button class="btn-delete" (click)="eliminar(item.id!)">🗑️</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal" [class.show]="showModal">
    <div class="modal-content">
      <h3>{{ editando ? 'Editar' : 'Nueva' }} Institución</h3>
      <input [(ngModel)]="formData.nombre" placeholder="Nombre *" class="form-input">
      <input [(ngModel)]="formData.ruc" placeholder="RUC" class="form-input">
      <input [(ngModel)]="formData.telefono" placeholder="Teléfono" class="form-input">
      <input [(ngModel)]="formData.email" placeholder="Email" class="form-input">
      <textarea [(ngModel)]="formData.direccion" placeholder="Dirección" class="form-input"></textarea>
      <label class="checkbox-label"><input type="checkbox" [(ngModel)]="formData.activo"> Activo</label>
      <div class="modal-buttons">
        <button class="btn-primary" (click)="guardar()">Guardar</button>
        <button class="btn-secondary" (click)="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>
</div>
