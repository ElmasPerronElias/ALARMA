<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-badge">LOGIN</div>
      <h2>Bienvenido de nuevo</h2>
      <p>Accede a tu panel de control del sistema de timbres.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" formControlName="username" placeholder="Ingresa tu usuario">
        <small *ngIf="username?.touched && username?.hasError('required')" class="field-error">El usuario es obligatorio.</small>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="Ingresa tu contraseña">
        <small *ngIf="password?.touched && password?.hasError('required')" class="field-error">La contraseña es obligatoria.</small>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Iniciar sesión</button>
    </form>

    <div *ngIf="errorMessage" class="message error">{{ errorMessage }}</div>
    <p class="auth-footer">¿No tienes cuenta? <a routerLink="/registro">Regístrate</a></p>
  </div>
</div>
